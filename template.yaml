AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: s3rv3rl3ss-backend - Collects AWS serverless data daily and commits to repo

Parameters:
  Schedule:
    Type: String
    Default: cron(0 6 * * ? *)
    Description: EventBridge schedule for data collection (daily at 6:00 UTC)
  GitRepoUrl:
    Type: String
    Description: HTTPS Git repo URL (e.g. https://github.com/user/s3rv3rl3ss.git)
  GitSecretArn:
    Type: String
    Description: Secrets Manager ARN containing git credentials (token)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 256

Resources:
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub s3rv3rl3ss-data-${AWS::AccountId}
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      VersioningConfiguration:
        Status: Enabled

  CollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/collector/
      Description: Collects AWS serverless data, quotas, pricing, news and limits
      Architectures:
        - arm64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          S3_KEY: data/services-aws.json
          TABLE_NAME: !Ref DataTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
        - Statement:
            - Effect: Allow
              Action:
                - servicequotas:GetServiceQuota
                - servicequotas:ListServiceQuotas
                - servicequotas:ListAWSDefaultServiceQuotas
                - pricing:GetProducts
                - pricing:DescribeServices
              Resource: '*'
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Description: Triggers daily AWS data collection
            Enabled: true

  GcpCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/gcp-collector/
      Description: Collects GCP serverless data, pricing, news and limits
      Architectures:
        - arm64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          S3_KEY: data/services-gcp.json
          STATISTICS_KEY: data/statistics-gcp.json
          TABLE_NAME: !Ref DataTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(15 6 * * ? *)
            Description: Triggers daily GCP data collection (15 min after AWS)
            Enabled: true

  AzureCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/azure-collector/
      Description: Collects Azure serverless data, pricing and limits
      Architectures:
        - arm64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          S3_KEY: data/services-azure.json
          STATISTICS_KEY: data/statistics-azure.json
          TABLE_NAME: !Ref DataTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(30 6 * * ? *)
            Description: Triggers daily Azure data collection (30 min after AWS)
            Enabled: true

  CommitterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/committer/
      Description: Commits updated JSON to GitHub repo via API when S3 object is created
      Architectures:
        - arm64
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          GIT_SECRET_ARN: !Ref GitSecretArn
          GITHUB_REPO: !Select [0, !Split [".git", !Select [1, !Split ["github.com/", !Ref GitRepoUrl]]]]
          GITHUB_BRANCH: main
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref GitSecretArn
      Events:
        S3Event:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref DataBucket
                object:
                  key:
                    - prefix: data/
                    - suffix: .json

  ComparisonsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/comparisons/
      Description: Generates comparisons.json from all provider data
      Architectures:
        - arm64
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          S3_KEY: data/comparisons.json
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(45 6 * * ? *)
            Description: Generates comparisons after all collectors finish
            Enabled: true

  ChangelogFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/changelog/
      Description: Generates changelog JSONs from DynamoDB for all providers
      Architectures:
        - arm64
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          TABLE_NAME: !Ref DataTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBReadPolicy:
            TableName: !Ref DataTable
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(50 6 * * ? *)
            Description: Generates changelogs after all collectors finish
            Enabled: true

  MetricsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.lambda_handler
      CodeUri: src/metrics/
      Description: Generates project infrastructure metrics from CloudWatch
      Architectures:
        - arm64
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          BUCKET_NAME: !Ref DataBucket
          TABLE_NAME: !Ref DataTable
          S3_KEY: data/metrics.json
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBReadPolicy:
            TableName: !Ref DataTable
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:GetMetricStatistics
                - lambda:ListFunctions
              Resource: '*'
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: cron(55 6 * * ? *)
            Description: Generates project metrics daily
            Enabled: true

  DataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub s3rv3rl3ss-${AWS::AccountId}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: gsi1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true


Outputs:
  DataBucketName:
    Value: !Ref DataBucket
  CollectorFunctionArn:
    Value: !GetAtt CollectorFunction.Arn
  GcpCollectorFunctionArn:
    Value: !GetAtt GcpCollectorFunction.Arn
  AzureCollectorFunctionArn:
    Value: !GetAtt AzureCollectorFunction.Arn
  CommitterFunctionArn:
    Value: !GetAtt CommitterFunction.Arn
  ComparisonsFunctionArn:
    Value: !GetAtt ComparisonsFunction.Arn
  ChangelogFunctionArn:
    Value: !GetAtt ChangelogFunction.Arn
  MetricsFunctionArn:
    Value: !GetAtt MetricsFunction.Arn
  DataTableName:
    Value: !Ref DataTable
